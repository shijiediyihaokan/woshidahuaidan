<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#1a2a5e"/>
  <!-- Green gear outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <!-- Gear teeth -->
  <g stroke="#4ade80" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="3" x2="16" y2="6"/>
    <line x1="24.2" y1="6.5" x2="22.5" y2="8.8"/>
    <line x1="28.5" y1="15" x2="25.5" y2="15.5"/>
    <line x1="25" y1="23" x2="22.5" y2="21.5"/>
    <line x1="16" y1="28" x2="16" y2="25"/>
    <line x1="7" y1="23" x2="9.5" y2="21.5"/>
    <line x1="3.5" y1="15" x2="6.5" y2="15.5"/>
    <line x1="7.8" y1="6.5" x2="9.5" y2="8.8"/>
  </g>
  <!-- Stylized C cutout in center -->
  <path d="M19 11a5.5 5.5 0 0 1 0 10" stroke="#1a2a5e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Small green core dot -->
  <circle cx="16" cy="16" r="2.5" fill="#4ade80"/>
</svg>
